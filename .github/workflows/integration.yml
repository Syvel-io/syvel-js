name: Integration tests

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Check secret is configured
        run: |
          if [ -z "$SYVEL_API_KEY" ]; then
            echo "❌ SYVEL_API_KEY secret is not configured in this repository."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          SYVEL_API_KEY: ${{ secrets.SYVEL_API_KEY }}

      - run: npm run test:integration
        env:
          SYVEL_API_KEY: ${{ secrets.SYVEL_API_KEY }}
